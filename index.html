                      <div className={`border-t pt-4 mt-4 select-none no-select ${theme === 'dark' ? 'border-slate-800' : 'border-slate-200'}`}>
                        <h3 className={`text-xs font-extrabold uppercase tracking-wider mb-2 select-none ${theme === 'dark' ? 'text-slate-400' : 'text-slate-500'}`}>Session Notes</h3>
                        <form 
                          onSubmit={(e) => {
                            e.preventDefault();
                            const input = e.target.elements.noteInput;
                            if (!input.value.trim()) return;
                            
                            // Get active question details to stamp onto the note
                            const currentSec = activeProject.sections[sessionState.currentSectionIndex];
                            const currentQ = currentSec?.questions?.[sessionState.currentQuestionIndex];
                            const qText = currentQ ? currentQ.text : 'General Discussion';

                            addSessionNote(input.value, qText);
                            input.value = '';
                          }}
                          className="flex gap-2"
                        >
                          <input 
                            name="noteInput"
                            type="text" 
                            className={`flex-1 text-xs px-3 py-2 rounded-lg placeholder-slate-450 focus:outline-none focus:border-brand-500 ${
                              theme === 'dark' 
                                ? 'bg-slate-955 border-slate-800 text-white placeholder-slate-600' 
                                : 'bg-white border-slate-250 text-slate-800 placeholder-slate-400'
                            }`}
                            placeholder="Type observation or quote..."
                            autoComplete="off"
                          />
                          <button 
                            type="submit"
                            className="px-3.5 py-2 bg-brand-700 hover:bg-brand-600 rounded-lg text-xs font-bold text-white transition-colors cursor-pointer"
                          >
                            Save
                          </button>
                        </form>

                        {sessionState.sessionNotes && sessionState.sessionNotes.length > 0 && (
                          <div className="mt-4 max-h-28 overflow-y-auto space-y-1.5 pr-1 select-text">
                            {sessionState.sessionNotes.map(note => (
                              <div 
                                key={note.id} 
                                className={`text-[10px] flex flex-col gap-0.5 p-2 rounded border ${
                                  theme === 'dark' 
                                    ? 'text-slate-400 bg-slate-955/45 border-slate-900' 
                                    : 'text-slate-650 bg-white border-slate-200 shadow-sm'
                                }`}
                              >
                                <span className="font-extrabold text-[8px] uppercase tracking-wider text-slate-400 select-none">
                                  During: {note.questionContext.substring(0, 45)}{note.questionContext.length > 45 ? '...' : ''}
                                </span>
                                <span className="line-clamp-2 leading-snug">{note.text}</span>
                              </div>
                            ))}
                          </div>
                        )}
                      </div>

                    </div>

                  </div>
                );
              })()}

            </div>
          )}

            <div className="flex-1 max-w-4xl w-full mx-auto p-6 md:p-8 animate-slide-up flex flex-col gap-6 select-text">
              
              {/* Header Panel */}
              <div className="border-b border-slate-200 dark:border-slate-855 pb-4">
                <h1 className="text-2xl font-extrabold flex items-center gap-2 text-slate-800 dark:text-white">

                </h1>
                <p className="text-sm text-slate-500 dark:text-slate-400 mt-1">

                </p>
              </div>

              {sessionState.unfinishedQuestions && sessionState.unfinishedQuestions.length > 0 && (
                <div className="p-6 rounded-2xl border border-red-200 dark:border-red-950 bg-red-50/30 dark:bg-red-955/10 flex flex-col gap-4 animate-slide-up">
                  <div className="flex items-center gap-2 text-red-800 dark:text-red-400 font-extrabold select-none">
                    <span>⚠️ Session Ended Early</span>
                  </div>

                  <div className="flex flex-col gap-2">
                    <label className="text-xs font-bold text-slate-700 dark:text-slate-300">Reason for ending session early:</label>
                    <textarea 
                      value={sessionState.endedEarlyReason}
                      onChange={(e) => {
                        const val = e.target.value;
                        setSessionState(prev => ({ ...prev, endedEarlyReason: val }));
                      }}
                      className="w-full text-xs p-3 border border-red-200 dark:border-red-900 bg-white dark:bg-slate-900 rounded-xl focus:ring-1 focus:ring-red-500 focus:outline-none"
                      placeholder="Type reason here (e.g. Technical issues, skipped last section)..."
                      rows="2"
                    />
                  </div>

                  <div>
                    <span className="text-xs font-bold text-slate-750 dark:text-slate-300 block mb-2 select-none">Unfinished Questions Checklist ({sessionState.unfinishedQuestions.length} Questions Skipped):</span>
                    <div className="max-h-48 overflow-y-auto space-y-2 border border-red-100 dark:border-red-950 bg-white/40 dark:bg-slate-900/40 p-3 rounded-xl">
                      {sessionState.unfinishedQuestions.map((uq, idx) => (
                        <div key={idx} className="text-xs leading-normal flex items-start gap-2 border-b border-red-50 dark:border-red-955/40 pb-2 last:border-b-0 last:pb-0">
                          <span className="bg-red-100 dark:bg-red-950 text-red-800 dark:text-red-400 px-1.5 py-0.5 rounded text-[10px] font-bold uppercase shrink-0 mt-0.5">Skipped</span>
                          <div>
                            <span className="font-bold text-slate-700 dark:text-slate-300 block text-[10px]">{uq.sectionName}</span>
                            <p className="text-slate-650 dark:text-slate-400">{uq.questionText}</p>
                          </div>
                        </div>
                      ))}
                    </div>
                  </div>
                </div>
              )}

              {/* Parked Topics Review Checklist */}
              <div className="p-6 rounded-2xl border border-slate-200 dark:border-slate-855 bg-white dark:bg-slate-900 shadow-sm">
                <h3 className="font-bold text-lg mb-2 flex items-center gap-2 text-slate-800 dark:text-slate-100">
                  <svg className="w-5 h-5 text-amber-500" fill="none" stroke="currentColor" strokeWidth="2.5" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" d="M5 5a2 2 0 012-2h10a2 2 0 012 2v2M7 7h10m-1 3H6a2 2 0 00-2 2v6a2 2 0 002 2h12a2 2 0 002-2v-6a2 2 0 00-2-2z"/></svg>
                  Parked Topics Review ({sessionState.parkedTopics.filter(t => !t.resolved).length} Unaddressed)
                </h3>
                <p className="text-xs text-slate-500 dark:text-slate-400 mb-4">
                  Check off the parked topics as you address them with the participant.
                </p>

                {sessionState.parkedTopics.length === 0 ? (
                  <div className="text-slate-400 text-xs italic p-4 text-center rounded-lg border border-dashed border-slate-200 dark:border-slate-800">
                    No topics were parked during this session.
                  </div>
                ) : (
                  <div className="space-y-2.5">
                    {sessionState.parkedTopics.map(topic => (
                      <label 
                        key={topic.id}
                        className={`flex items-start gap-3 p-3 border rounded-xl cursor-pointer select-none no-select transition-all ${
                          topic.resolved 
                            ? 'bg-slate-50/50 dark:bg-slate-955/20 border-slate-200 dark:border-slate-900 text-slate-450 line-through' 
                            : 'bg-white dark:bg-slate-900 border-slate-200 dark:border-slate-800 text-slate-800 dark:text-slate-100 hover:border-slate-300 dark:hover:border-slate-700'
                        }`}
                      >
                        <input 
                          type="checkbox" 
                          checked={topic.resolved}
                          onChange={() => toggleParkedTopic(topic.id)}
                          className="rounded border-slate-300 dark:border-slate-700 text-brand-600 focus:ring-brand-500 h-4 w-4 mt-0.5 cursor-pointer"
                        />
                        <span className="text-sm font-semibold leading-normal">{topic.text}</span>
                      </label>
                    ))}
                  </div>
                )}
              </div>

              {/* Captured In-Session Notes */}
              <div className="p-6 rounded-2xl border border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900 shadow-sm">
                <h3 className="font-bold text-lg mb-2 flex items-center gap-2 text-slate-800 dark:text-slate-105">
                  <span>📝</span> Captured In-Session Notes ({sessionState.sessionNotes?.length || 0})
                </h3>
                <p className="text-xs text-slate-500 dark:text-slate-400 mb-4 font-semibold select-none">
                  Notes captured during specific questions in the presentation slides run.
                </p>

                {(!sessionState.sessionNotes || sessionState.sessionNotes.length === 0) ? (
                  <div className="text-slate-400 text-xs italic p-4 text-center rounded-lg border border-dashed border-slate-200 dark:border-slate-800 select-none">
                    No notes were captured during the session.
                  </div>
                ) : (
                  <div className="space-y-3">
                    {sessionState.sessionNotes.map((note, idx) => (
                      <div 
                        key={note.id} 
                        className={`p-3.5 border rounded-xl flex flex-col gap-1.5 ${
                          theme === 'dark' 
                            ? 'bg-slate-955/35 border-slate-800' 
                            : 'bg-slate-50/50 border-slate-200 shadow-sm'
                        }`}
                      >
                        <span className="font-bold text-[9px] uppercase tracking-wider text-brand-600 dark:text-indigo-400 select-none">
                          Question Context: "{note.questionContext}"
                        </span>
                        <p className="text-xs text-slate-700 dark:text-slate-200 font-medium leading-relaxed select-text">{note.text}</p>
                      </div>
                    ))}
                  </div>
                )}
              </div>

              {/* Notes Box */}
              <div className="flex flex-col gap-2 select-text">
                <label className="font-bold text-sm text-slate-700 dark:text-slate-300">Session Notes & Summary</label>
                <textarea 
                  value={wrapUpNotes}
                  onChange={(e) => setWrapUpNotes(e.target.value)}
                  className="w-full h-44 p-4 border border-slate-200 dark:border-slate-855 bg-white dark:bg-slate-955 rounded-2xl focus:ring-2 focus:ring-brand-500 focus:outline-none text-sm leading-relaxed"
                  placeholder="Capture key session takeaways, participant feedback, or quotes here..."
                />
              </div>

              {/* Action Buttons */}
              <div className="flex flex-wrap gap-3 justify-between items-center border-t border-slate-200 dark:border-slate-855 pt-6 select-none">
                
                <button 
                  onClick={() => {
                    saveSessionToHistory(wrapUpNotes);
                    const sessionLog = {
                      projectName: activeProject.name,
                      date: new Date().toISOString(),
                      mode: sessionState.mode,
                      sessionNumber: sessionState.sessionNumber,
                      durationSeconds: sessionState.sessionDurationElapsed,
                      parkedTopics: sessionState.parkedTopics,
                      elapsedTimes: sessionState.elapsedTimes,
                      endedEarlyReason: sessionState.endedEarlyReason,
                      unfinishedQuestions: sessionState.unfinishedQuestions,
                      notes: wrapUpNotes,
                      sessionNotes: sessionState.sessionNotes
                    };
                    const dataStr = JSON.stringify(sessionLog, null, 2);
                    const dataUri = 'data:application/json;charset=utf-8,'+ encodeURIComponent(dataStr);
                    const linkElement = document.createElement('a');
                    linkElement.setAttribute('href', dataUri);
                    linkElement.setAttribute('download', `session_log_${activeProject.name.replace(/[^a-z0-9]/gi, '_').toLowerCase()}_${new Date().toISOString().slice(0,10)}.json`);
                    linkElement.click();
                    showToast("Session log exported!", "success");
                  }}
                  className="flex items-center gap-2 px-4 py-2.5 rounded-xl border border-slate-200 dark:border-slate-800 hover:bg-slate-100 dark:hover:bg-slate-800 text-sm font-semibold transition-colors cursor-pointer"
                >
                  <svg className="w-4 h-4" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/></svg>
                  Export Session Logs
                </button>

                <div className="flex gap-2">
                  <button 
                    onClick={() => {
                      saveSessionToHistory(wrapUpNotes);
                      setView('dashboard');
                    }}
                    className="px-5 py-2.5 border border-slate-200 dark:border-slate-800 hover:bg-slate-100 dark:hover:bg-slate-800 text-slate-700 dark:text-slate-300 rounded-xl text-sm font-semibold transition-colors cursor-pointer"
                  >
                    Close & Exit
                  </button>
                </div>

              </div>

            </div>
          )}

          {/* Session History Details Modal */}
          {selectedReport && (
            <div className="fixed inset-0 z-50 bg-slate-950/70 backdrop-blur-md flex items-center justify-center p-4 select-text">
              <div className="bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-3xl max-w-2xl w-full max-h-[85vh] flex flex-col shadow-2xl animate-slide-up">
                
                {/* Modal Header */}
                <div className="p-6 border-b border-slate-100 dark:border-slate-800 flex justify-between items-center select-none no-select">
                  <div>
                    <span className="text-[10px] bg-brand-100 dark:bg-brand-900 text-brand-700 dark:text-brand-300 px-2 py-0.5 rounded font-extrabold uppercase">
                      Session Report Details
                    </span>
                    <h3 className="text-lg font-black text-slate-800 dark:text-white mt-1">
                      Session #{selectedReport.sessionNumber} ({selectedReport.mode === 'trial' ? 'Trial Run' : 'Real Study'})
                    </h3>
                    <p className="text-[11px] text-slate-400 mt-0.5">
                      Date Conducted: {selectedReport.timestamp} • Duration: {Math.floor(selectedReport.durationSeconds / 60)}m {selectedReport.durationSeconds % 60}s
                    </p>
                  </div>
                  <button 
                    onClick={() => setSelectedReport(null)}
                    className="p-2 border border-slate-200 dark:border-slate-800 rounded-xl hover:bg-slate-100 dark:hover:bg-slate-800 text-slate-500 hover:text-slate-700 dark:hover:text-slate-350 cursor-pointer"
                  >
                    <svg className="w-5 h-5" fill="none" stroke="currentColor" strokeWidth="2.5" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" d="M6 18L18 6M6 6l12 12"/></svg>
                  </button>
                </div>

                {/* Modal Content Scrollable */}
                <div className="flex-1 overflow-y-auto p-6 space-y-6">
                  
                  {/* Status Alert */}
                  {selectedReport.endedEarly ? (
                    <div className="p-4 bg-red-50 dark:bg-red-955/20 border border-red-200/40 dark:border-red-900/40 text-red-800 dark:text-red-300 rounded-2xl text-xs">
                      <span className="font-extrabold block uppercase tracking-wider text-[10px] text-red-500 mb-1">⚠️ Session Ended Early</span>
                      <div className="font-semibold">Reason: <span className="font-normal italic">"{selectedReport.endedEarlyReason || 'No reason provided.'}"</span></div>
                    </div>
                  ) : (
                    <div className="p-4 bg-emerald-50 dark:bg-emerald-955/20 border border-emerald-200/40 dark:border-emerald-900/40 text-emerald-800 dark:text-emerald-305 rounded-2xl text-xs">
                      <span className="font-extrabold block uppercase tracking-wider text-[10px] text-emerald-500 mb-0.5">✓ Session Fully Completed</span>
                      <div>The discussion guide was completed in its entirety.</div>
                    </div>
                  )}

                  {/* Counterbalanced Stimuli Shown */}
                  <div>
                    <h4 className="text-xs uppercase font-extrabold tracking-wider text-slate-400 mb-2">🔄 Stimuli Mappings Shown:</h4>
                    {(!selectedReport.counterbalanceStimuli || Object.keys(selectedReport.counterbalanceStimuli).length === 0) ? (
                      <div className="text-xs text-slate-455 italic">No stimuli counterbalance mappings applied for this session.</div>
                    ) : (
                      <div className="border border-slate-100 dark:border-slate-800/80 rounded-xl overflow-hidden text-xs">
                        <table className="w-full text-left border-collapse">
                          <thead>
                            <tr className="bg-slate-50 dark:bg-slate-950 border-b border-slate-105 dark:border-slate-800 text-[10px] font-bold uppercase tracking-wider text-slate-455">
                              <th className="p-2.5">Question</th>
                              <th className="p-2.5">Stimulus Shown</th>
                            </tr>
                          </thead>
                          <tbody>
                            {Object.entries(selectedReport.counterbalanceStimuli).map(([qText, stimName], i) => (
                              <tr key={i} className="border-b border-slate-105 dark:border-slate-800/60 hover:bg-slate-50/20 dark:hover:bg-slate-955/15 last:border-b-0">
                                <td className="p-2.5 text-slate-700 dark:text-slate-300 font-medium">{qText}</td>
                                <td className="p-2.5 text-brand-600 dark:text-brand-400 font-bold">{stimName}</td>
                              </tr>
                            ))}
                          </tbody>
                        </table>
                      </div>
                    )}
                  </div>

                  {/* Parked Questions / Comments per session */}
                  <div>
                    <h4 className="text-xs uppercase font-extrabold tracking-wider text-slate-400 mb-2">📋 Parked Questions / Comments:</h4>
                    {(!selectedReport.parkedTopics || selectedReport.parkedTopics.length === 0) ? (
                      <div className="text-xs text-slate-455 italic">No topics were parked during this session.</div>
                    ) : (
                      <div className="space-y-2">
                        {selectedReport.parkedTopics.map((topic, i) => (
                          <div key={i} className="p-2.5 bg-slate-50 dark:bg-slate-955 border border-slate-205 dark:border-slate-850 rounded-xl flex items-center justify-between gap-3 text-xs">
                            <span className="font-semibold text-slate-700 dark:text-slate-350">{topic.text}</span>
                            <span className={`px-2 py-0.5 rounded text-[9px] font-bold uppercase ${
                              topic.resolved
                                ? 'bg-emerald-50 dark:bg-emerald-955 text-emerald-600 dark:text-emerald-400'
                                : 'bg-red-50 dark:bg-red-955 text-red-600 dark:text-red-400'
                            }`}>
                              {topic.resolved ? 'Addressed' : 'Unaddressed'}
                            </span>
                          </div>
                        ))}
                      </div>
                    )}
                  </div>

                  {/* Skipped questions list */}
                  {selectedReport.unfinishedQuestions && selectedReport.unfinishedQuestions.length > 0 && (
                    <div>
                      <h4 className="text-xs uppercase font-extrabold tracking-wider text-slate-400 mb-2">❌ Skipped / Unfinished Questions:</h4>
                      <div className="space-y-2 max-h-36 overflow-y-auto">
                        {selectedReport.unfinishedQuestions.map((uq, i) => (
                          <div key={i} className="p-2.5 bg-red-500/5 border border-red-500/10 rounded-xl text-xs">
                            <span className="font-extrabold text-[9px] text-red-400 block uppercase mb-0.5">{uq.sectionName}</span>
                            <div className="text-slate-605 dark:text-slate-300">{uq.questionText}</div>
                          </div>
                        ))}
                      </div>
                    </div>
                  )}

                  {/* Captured In-Session Notes */}
                  <div>
                    <h4 className="text-xs uppercase font-extrabold tracking-wider text-slate-400 mb-2">📝 Captured In-Session Notes:</h4>
                    {(!selectedReport.sessionNotes || selectedReport.sessionNotes.length === 0) ? (
                      <div className="text-xs text-slate-455 italic">No notes were captured during the session.</div>
                    ) : (
                      <div className="space-y-2 max-h-48 overflow-y-auto">
                        {selectedReport.sessionNotes.map((note, i) => (
                          <div key={i} className="p-3 bg-slate-50 dark:bg-slate-955 border border-slate-200 dark:border-slate-800 rounded-xl text-xs flex flex-col gap-1">
                            <span className="font-extrabold text-[8px] uppercase tracking-wider text-brand-600 dark:text-indigo-400 select-none">
                              During: "{note.questionContext}"
                            </span>
                            <div className="text-slate-705 dark:text-slate-200">{note.text}</div>
                          </div>
                        ))}
                      </div>
                    )}
                  </div>

                  {/* Session notes summary */}
                  <div>
                    <h4 className="text-xs uppercase font-extrabold tracking-wider text-slate-400 mb-2">📝 Session Notes & Summary:</h4>
                    {selectedReport.notes ? (
                      <div className="p-4 bg-slate-50 dark:bg-slate-955 border border-slate-200 dark:border-slate-800 rounded-2xl text-xs leading-relaxed text-slate-700 dark:text-slate-300 whitespace-pre-wrap">
                        {selectedReport.notes}
                      </div>
                    ) : (
                      <div className="text-xs text-slate-455 italic">No notes were taken for this session.</div>
                    )}
                  </div>

                </div>

                {/* Modal Footer */}
                <div className="p-6 border-t border-slate-100 dark:border-slate-800 flex justify-end select-none no-select">
                  <button 
                    onClick={() => setSelectedReport(null)}
                    className="px-5 py-2 bg-indigo-650 hover:bg-indigo-600 text-white rounded-xl text-xs font-bold transition-colors cursor-pointer"
                  >
                    Done
                  </button>
                </div>

              </div>
            </div>
          )}

        </div>
      );
    }

    const container = document.getElementById('root');
    const root = ReactDOM.createRoot(container);
    root.render(<App />);
  </script>
</body>
</html>
