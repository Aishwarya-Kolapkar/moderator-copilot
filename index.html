  <script>
    window.onerror = function(message, source, lineno, colno, error) {
      showError('window.onerror', message + ' (' + source + ':' + lineno + ':' + colno + ')', error ? error.stack : '');
    };
    
    const originalConsoleError = console.error;
    console.error = function(...args) {
      originalConsoleError.apply(console, args);
      const msg = args.map(arg => typeof arg === 'object' ? JSON.stringify(arg) : String(arg)).join(' ');
      showError('console.error', msg, '');
    };

    function showError(source, message, stack) {
      if (document.getElementById('debug-error-box')) return;
      const errorBox = document.createElement('div');
      errorBox.id = 'debug-error-box';
      errorBox.style.position = 'fixed';
      errorBox.style.top = '0';
      errorBox.style.left = '0';
      errorBox.style.width = '100%';
      errorBox.style.height = '100%';
      errorBox.style.backgroundColor = '#7f1d1d';
      errorBox.style.color = '#fecaca';
      errorBox.style.padding = '20px';
      errorBox.style.zIndex = '999999';
      errorBox.style.fontFamily = 'monospace';
      errorBox.style.fontSize = '14px';
      errorBox.style.whiteSpace = 'pre-wrap';
      errorBox.style.overflow = 'auto';
      errorBox.innerHTML = '<h1>🚨 Critical JS Error Captured (' + source + ')</h1>' +
        '<b>Message:</b> ' + message + '\n\n' +
        '<b>Stack:</b>\n' + (stack || 'No stack trace available');
      document.body.appendChild(errorBox);
    }
  </script>

    // --- CSV PARSING HELPER ---
    function parseCSV(text) {
      const lines = [];
      let row = [""];
      let inQuotes = false;
      for (let i = 0; i < text.length; i++) {
        const c = text[i];
        const next = text[i+1];
        if (c === '"') {
          if (inQuotes && next === '"') {
            row[row.length - 1] += '"';
            i++;
          } else {
            inQuotes = !inQuotes;
          }
        } else if (c === ',' && !inQuotes) {
          row.push("");
        } else if ((c === '\r' || c === '\n') && !inQuotes) {
          if (c === '\r' && next === '\n') { i++; }
          lines.push(row);
          row = [""];
        } else {
          row[row.length - 1] += c;
        }
      }
      if (row.length > 1 || row[0] !== "") {
        lines.push(row);
      }
      return lines;
    }

    // --- CSV EXPORT HELPER ---
    function exportToCSV(project) {
      const headers = [
        "Section Name",
        "Section Duration (mins)",
        "Section Strict Priority",
        "Question Text",
        "Question Probing Notes",
        "Question Stimulus Name",
        "Question Stimulus URL",
        "Screen Share Reminder",
        "Question Custom Duration (mins)"
      ];

      const rows = [];
      project.sections.forEach(sec => {
        sec.questions.forEach(q => {
          const stim = project.stimuli?.find(s => s.id === q.stimulusId);
          rows.push([
            sec.name,
            sec.duration.toString(),
            sec.strictPriority ? "true" : "false",
            q.text,
            q.probingNotes || "",
            stim ? stim.name : "",
            stim ? stim.url : "",
            q.screenShareReminder || "none",
            q.timeOverride ? q.timeOverride.toString() : ""
          ]);
        });
      });

      const escapeCSVField = (field) => {
        if (field.includes('"') || field.includes(',') || field.includes('\n') || field.includes('\r')) {
          return '"' + field.replace(/"/g, '""') + '"';
        }
        return field;
      };

      const csvContent = [
        headers.map(escapeCSVField).join(','),
        ...rows.map(row => row.map(escapeCSVField).join(','))
      ].join('\n');

      const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
      const url = URL.createObjectURL(blob);
      const link = document.createElement("a");
      link.setAttribute("href", url);
      link.setAttribute("download", `${project.name.replace(/[^a-z0-9]/gi, '_').toLowerCase()}_guide.csv`);
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);
    }

    function parseRawTextToStructuredGuide(text) {
      // Pre-process text to insert newline before bracketed instructions on section header lines
      const processedText = text.replace(/^(scenario|part|section|topic|module)\b([^\[\n]*?)(\[[^\d\n]*)/gim, '$1$2\n$3');
      const lines = processedText.split('\n').map(l => l.trim()).filter(l => l.length > 0);
      const sections = [];
      const projectStimuli = [];
      let currentSection = null;
      let currentQuestion = null;
      let lastLineWasQuestion = false;
      let lastLineWasProbing = false;
      let previousLineText = "";

      lines.forEach(line => {
        if (/^---\s*Page\s+\d+\s*---$/i.test(line)) return;

        let cleanLine = line;

        // 1. Check if line is a section/topic header
        const isSectionHeader = 
          /^(scenario)\b\s*[a-z0-9\.]*[\.\:\-\s]/i.test(cleanLine) ||
          /^(part|section|topic|module)\b\s*[a-z0-9\.]*[\.\:\-]/i.test(cleanLine) ||
          (/^(introduction|debrief|feedback|warm-up|wrap-up|discussion|reflections)\b/i.test(cleanLine) && (cleanLine.length < 60 || /\[\d+\s*(minutes?|mins?|min)\]/i.test(cleanLine))) ||
          /\[\d+\s*(minutes?|mins?|min)\]/i.test(cleanLine) ||
          /\(\~\d+\s*(minutes?|mins?|min)\)/i.test(cleanLine) ||
          (cleanLine.length < 50 && cleanLine === cleanLine.toUpperCase() && !cleanLine.includes('?') && !/^[0-9]+[\.\)]/.test(cleanLine));

        // 2. Check if line is a list marker (Q, number, letter, bullet point, hyphen)
        const startsWithListMarker = 
          /^(q|question)\b\s*\d*[\.\:]?/i.test(cleanLine) || // Q, Q1, Q., Q:, Question, Q1.
          /^\d+[\.\)\-\s]\s*/.test(cleanLine) ||             // 1., 1), 1-
          /^[a-z][\.\)\-]\s*/i.test(cleanLine) ||           // a., a), a-
          /^[\-\•\*\+\–\○\■\●\◦\▪\▫\✓\✔]\s*/.test(cleanLine); // -, •, *, +, –, ○, ■, ●, ◦, ▪, ▫, ✓, ✔

        // 3. Check if line is an explicit Probe/Note (can have optional leading list markers, bullets, or spaces)
        const isExplicitProbeOrNote = 
          /^([\-\•\*\+\–\○\■\●\◦\▪\▫\✓\✔\s]*|([a-z0-9]+[\.\)\-\s]\s*))(probe|note|probing|follow-up|followup|moderator note|probes|notes|tip|reminder|context for)s?[\.\:\-\s]/i.test(cleanLine);

        // 4. Check if it starts with capitalized question words or action verbs
        const startsWithQuestionWord = 
          /^[A-Z][a-z]*\b\s*(how|what|why|where|when|who|which|can|could|would|do|does|did|is|are|was|were)\b/.test(cleanLine);
        const startsWithActionVerb = 
          /^[A-Z][a-z]*\b\s*(search|find|navigate|click|purchase|buy|add|checkout|select|go to|explore|look at|evaluate|observe|test|compare|describe|explain|tell|please)\b/.test(cleanLine);
        
        const firstChar = cleanLine.charAt(0);
        
        const isQuestionOrSentence = 
          startsWithListMarker || 
          startsWithQuestionWord || 
          startsWithActionVerb;

        // A line is a new question (slide) if it is a question or sentence AND NOT an explicit probe/note!
        const isNewQuestion = isQuestionOrSentence && !isExplicitProbeOrNote && !isSectionHeader;

        // 5. Continuation checks
        const isContinuation = !!currentQuestion && !isSectionHeader && !isNewQuestion;

        if (isSectionHeader) {
          currentQuestion = null;
          lastLineWasQuestion = false;
          lastLineWasProbing = false;
          currentSection = {
            id: 'sec_' + generateId(),
            name: cleanLine,
            duration: 10,
            strictPriority: false,
            questions: []
          };
          sections.push(currentSection);
        } else if (isContinuation) {
          // If explicit probe/note or previous was probing, keep it as probing notes on same slide
          if (isExplicitProbeOrNote || lastLineWasProbing) {
            currentQuestion.probingNotes = currentQuestion.probingNotes 
              ? currentQuestion.probingNotes + "\n" + cleanLine 
              : cleanLine;
            lastLineWasQuestion = false;
            lastLineWasProbing = true;
          } else {
            const startsWithBullet = /^[\-\•\*\+\–\○\■\●\◦\▪\▫\✓\✔]\s*/.test(cleanLine);
            if (startsWithBullet) {
              currentQuestion.text += "\n" + cleanLine;
            } else {
              currentQuestion.text += " " + cleanLine;
            }
          }
        } else if (isNewQuestion) {
          // Create new question (slide)
          if (!currentSection) {
            currentSection = {
              id: 'sec_' + generateId(),
              name: '1. Introduction',
              duration: 10,
              strictPriority: false,
              questions: []
            };
            sections.push(currentSection);
          }

          const urlRegex = /(https?:\/\/[^\s\)]+)/gi;
          const urls = cleanLine.match(urlRegex) || [];
          let stimulusId = '';
          
          urls.forEach(url => {
            let existingStim = projectStimuli.find(s => s.url === url);
            if (!existingStim) {
              existingStim = {
                id: 'stim_' + generateId(),
                name: `Stimulus ${projectStimuli.length + 1}`,
                type: 'url',
                url: url,
                fileName: ''
              };
              projectStimuli.push(existingStim);
            }
            stimulusId = existingStim.id;
          });

          let reminder = 'none';
          const lowercaseLine = cleanLine.toLowerCase();
          if (/share.*screen/i.test(lowercaseLine) || /screen.*share/i.test(lowercaseLine)) {
            if (/ask|participant|user|them/i.test(lowercaseLine)) {
              reminder = 'participant';
            } else {
              reminder = 'moderator';
            }
          } else if (/show.*prototype/i.test(lowercaseLine) || /launch.*prototype/i.test(lowercaseLine) || /prototype/i.test(lowercaseLine) || stimulusId) {
            reminder = 'participant';
          }

          currentQuestion = {
            id: 'q_' + generateId(),
            text: cleanLine,
            probingNotes: '',
            stimulusId: stimulusId,
            screenShareReminder: reminder
          };
          currentSection.questions.push(currentQuestion);
          lastLineWasQuestion = true;
          lastLineWasProbing = false;
        } else {
          // Default fallback (treat as probing note on current question, or create a new question if none exists)
          if (currentQuestion) {
            currentQuestion.probingNotes = currentQuestion.probingNotes 
              ? currentQuestion.probingNotes + '\n' + cleanLine 
              : cleanLine;
            lastLineWasQuestion = false;
            lastLineWasProbing = true;
          } else if (currentSection && /^[a-z]/.test(cleanLine)) {
            currentSection.name += " " + cleanLine;
          } else {
            if (!currentSection) {
              currentSection = {
                id: 'sec_' + generateId(),
                name: '1. Warm-up & Intro',
                duration: 5,
                strictPriority: false,
                questions: []
              };
              sections.push(currentSection);
            }
            currentQuestion = {
              id: 'q_' + generateId(),
              text: cleanLine,
              probingNotes: '',
              stimulusId: '',
              screenShareReminder: 'none'
            };
            currentSection.questions.push(currentQuestion);
            lastLineWasQuestion = true;
            lastLineWasProbing = false;
          }
        }

        previousLineText = cleanLine;
      });

      sections.forEach(sec => {
        if (!sec.questions || sec.questions.length === 0) {
          sec.questions = [{
            id: 'q_' + generateId(),
            text: 'Topic discussion overview.',
            probingNotes: '',
            stimulusId: '',
            screenShareReminder: 'none'
          }];
        }
      });

      return { sections, stimuli: projectStimuli };
    }

    // Declared here at top level to ensure variable hosting doesn't throw ReferenceError inside React compile loop
    const CounterbalanceEditor = ({ project, setProjects, projectId, showToast }) => {
      const numSessions = project.plannedSessions || 4;
      const stimulusWeights = project.stimulusWeights || {};

      const [draggedStimIndex, setDraggedStimIndex] = useState(null);
      const [bulkStimId, setBulkStimId] = useState('');
      const [draggedSessionIndex, setDraggedSessionIndex] = useState(null);

      const handleStimDragStart = (e, index) => {
        setDraggedStimIndex(index);
        e.dataTransfer.effectAllowed = "move";
      };

      const handleStimDragOver = (e, index) => {
        e.preventDefault();
      };

      const handleStimDrop = (e, targetIndex) => {
        e.preventDefault();
        if (draggedStimIndex === null || draggedStimIndex === targetIndex) return;

        const newStims = [...(project.stimuli || [])];
        const [removed] = newStims.splice(draggedStimIndex, 1);
        newStims.splice(targetIndex, 0, removed);

        setProjects(prev => prev.map(p => p.id === projectId ? { ...p, stimuli: newStims } : p));
        setDraggedStimIndex(null);
        showToast("Rearranged stimuli order", "info");
      };

      const handleSessionDragStart = (e, index) => {
        setDraggedSessionIndex(index);
        e.dataTransfer.effectAllowed = "move";
      };

      const handleSessionDragOver = (e, index) => {
        e.preventDefault();
      };

      const handleSessionDrop = (e, targetIndex) => {
        e.preventDefault();
        if (draggedSessionIndex === null || draggedSessionIndex === targetIndex) return;

        const fromSessionNum = draggedSessionIndex + 1;
        const toSessionNum = targetIndex + 1;

        setProjects(prev => prev.map(p => {
          if (p.id !== projectId) return p;
          const cb = { ...(p.counterbalance || {}) };
          const fromConfig = cb[fromSessionNum];
          const toConfig = cb[toSessionNum];

          cb[fromSessionNum] = toConfig;
          cb[toSessionNum] = fromConfig;
          return { ...p, counterbalance: cb };
        }));

        setDraggedSessionIndex(null);
        showToast(`Swapped assignments for Session ${fromSessionNum} and Session ${toSessionNum}`, "info");
      };

      const sectionsWithStim = useMemo(() => {
        const list = [];
        if (!project || !project.sections) return list;
        project.sections.forEach(sec => {
          if (sec.stimulusId) {
            list.push({ id: sec.id, name: sec.name, defaultStimId: sec.stimulusId });
          }
        });
        return list;
      }, [project]);

      const handleWeightChange = (stimId, val) => {
        const parsedVal = Math.max(1, parseInt(val) || 1);
        setProjects(prev => prev.map(p => {
          if (p.id !== projectId) return p;
          const sw = { ...(p.stimulusWeights || {}) };
          sw[stimId] = parsedVal;
          return { ...p, stimulusWeights: sw };
        }));
      };

      const setPlannedSessions = (val) => {
        setProjects(prev => prev.map(p => p.id === projectId ? {
          ...p,
          plannedSessions: val
        } : p));
      };

      const handleCellChange = (sessionNum, qId, stimId) => {
        setProjects(prev => prev.map(p => {
          if (p.id !== projectId) return p;
          const cb = { ...(p.counterbalance || {}) };
          cb[sessionNum] = { ...(cb[sessionNum] || {}) };
          cb[sessionNum][qId] = stimId;
          return { ...p, counterbalance: cb };
        }));
      };

      // Calculate Hamilton Method Allocation (Largest Remainder)
      const calculatedAllocation = useMemo(() => {
        const stims = project.stimuli || [];
        if (stims.length === 0) return [];
        
        const weights = stims.map(s => stimulusWeights[s.id] || 1);
        const totalWeight = weights.reduce((a, b) => a + b, 0) || 1;

        const fractions = stims.map(s => ((stimulusWeights[s.id] || 1) / totalWeight) * numSessions);
        const allocations = fractions.map(f => Math.floor(f));
        let allocatedSum = allocations.reduce((a, b) => a + b, 0);
        let remainders = fractions.map((f, idx) => ({ remainder: f - allocations[idx], idx }));
        remainders.sort((a, b) => b.remainder - a.remainder);

        let r = numSessions - allocatedSum;
        for (let i = 0; i < r; i++) {
          allocations[remainders[i].idx]++;
        }

        return stims.map((s, idx) => ({
          id: s.id,
          name: s.name,
          ratioWeight: stimulusWeights[s.id] || 1,
          allocatedSessions: allocations[idx],
          percentage: ((allocations[idx] / numSessions) * 100).toFixed(0)
        }));
      }, [project, numSessions, stimulusWeights]);

      useEffect(() => {
        const stims = project.stimuli || [];
        if (stims.length === 0 || sectionsWithStim.length === 0) return;

        const cb = project.counterbalance || {};
        const needsGen = Array.from({ length: numSessions }, (_, i) => i + 1).some(s => {
          if (!cb[s]) return true;
          if (sectionsWithStim.some(sec => cb[s][sec.id] === undefined)) return true;
          const cbKeys = Object.keys(cb[s]);
          if (cbKeys.some(k => !sectionsWithStim.some(sec => sec.id === k))) return true;
          return false;
        });

        if (needsGen) {
          const pool = [];
          calculatedAllocation.forEach(alloc => {
            for (let c = 0; c < alloc.allocatedSessions; c++) {
              pool.push(alloc.id);
            }
          });

          if (pool.length === 0) return;

          const newCounterbalance = {};
          let secIndex = 0;
          (project.sections || []).forEach(sec => {
            if (sec.stimulusId) {
              for (let s = 1; s <= numSessions; s++) {
                const poolIndex = (s - 1 + secIndex) % pool.length;
                newCounterbalance[s] = newCounterbalance[s] || {};
                newCounterbalance[s][sec.id] = pool[poolIndex];
              }
              secIndex++;
            }
          });

          setProjects(prev => prev.map(p => p.id === projectId ? {
            ...p,
            counterbalance: newCounterbalance
          } : p));
        }
      }, [project.stimuli, sectionsWithStim, numSessions, calculatedAllocation, projectId, setProjects, project.counterbalance]);

      const autoGenerateRotations = () => {
        const stims = project.stimuli || [];
        if (stims.length === 0) {
          showToast("Please add stimuli to the library first.", "error");
          return;
        }

        // Build pool from computed allocation counts
        const pool = [];
        calculatedAllocation.forEach(alloc => {
          for (let c = 0; c < alloc.allocatedSessions; c++) {
            pool.push(alloc.id);
          }
        });

        if (pool.length === 0) return;

        const newCounterbalance = {};
        let secIndex = 0;
        (project.sections || []).forEach(sec => {
          if (sec.stimulusId) {
            for (let s = 1; s <= numSessions; s++) {
              const poolIndex = (s - 1 + secIndex) % pool.length;
              newCounterbalance[s] = newCounterbalance[s] || {};
              newCounterbalance[s][sec.id] = pool[poolIndex];
            }
            secIndex++;
          }
        });

        setProjects(prev => prev.map(p => p.id === projectId ? {
          ...p,
          counterbalance: newCounterbalance
        } : p));
        showToast("Counterbalance matrix auto-generated according to target ratio!", "success");
      };

      const handleSectionStimLink = (secId, stimId) => {
        setProjects(prev => prev.map(p => {

          return {
            ...p,
            sections: p.sections.map(sec => sec.id === secId ? { ...sec, stimulusId: stimId } : sec)

        }));
        showToast("Updated topic stimulus link", "success");
      };

      return (
        <div className="bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-850 p-6 rounded-2xl shadow-sm space-y-6 select-text animate-slide-up">
          
          {/* Header Panel */}
          <div className="flex justify-between items-center flex-wrap gap-4 border-b border-slate-100 dark:border-slate-800 pb-4 select-none no-select">
            <div>
              <h4 className="font-extrabold text-sm uppercase tracking-wider text-slate-800 dark:text-slate-100 flex items-center gap-1.5">
                <span>🔄</span> Counterbalance Matrix Generator
              </h4>
              <p className="text-[11px] text-slate-455 mt-0.5">
                Specify session count and distribution ratios to balance stimulus exposure.
              </p>
            </div>
            
            <div className="flex items-center gap-3">
              <label className="text-[10px] font-bold text-slate-505 uppercase tracking-wider">Planned Sessions:</label>
              <select 
                value={numSessions}
                onChange={(e) => setPlannedSessions(parseInt(e.target.value))}
                className="text-xs p-2 bg-slate-50 dark:bg-slate-950 border border-slate-200 dark:border-slate-800 rounded-xl text-slate-800 dark:text-slate-205 font-extrabold cursor-pointer focus:outline-none"
              >
                {[2, 3, 4, 6, 8, 10, 12, 16, 20].map(n => (
                  <option key={n} value={n}>{n} Sessions</option>
                ))}
              </select>
            </div>
          </div>

          {/* 🔗 Link Stimuli to Guide Topics (Sections) */}
          <div className="bg-slate-50 dark:bg-slate-955 p-5 border border-slate-205 dark:border-slate-855 rounded-2xl space-y-3 animate-slide-up">
            <h5 className="text-[11px] font-black uppercase text-slate-500 tracking-wider">
              🔗 Link Stimuli to Guide Topics (Sections)
            </h5>
            <p className="text-xs text-slate-550 dark:text-slate-405 font-semibold mb-2">
              Before setting up counterbalancing, link a default stimulus to the relevant topics/sections.
            </p>

            {/* Bulk Action Toolbar */}
            <div className="flex flex-wrap items-center gap-3 p-3 bg-white dark:bg-slate-900 border border-slate-200/60 dark:border-slate-805 rounded-2xl text-xs select-none shadow-sm">
              <span className="font-bold text-slate-500 flex items-center gap-1">⚡ Bulk Action:</span>
              <select 
                value={bulkStimId}
                onChange={(e) => setBulkStimId(e.target.value)}
                className="text-[10px] p-2 bg-slate-50 dark:bg-slate-950 border border-slate-200 dark:border-slate-800 rounded-xl cursor-pointer font-bold text-slate-705 dark:text-slate-200 focus:outline-none"
              >
                <option value="">Select Stimulus...</option>
                <option value="clear_all">None (Unlink All)</option>
                {(project.stimuli || []).map(stim => (
                  <option key={stim.id} value={stim.id}>{stim.name}</option>
                ))}
              </select>
              <button
                onClick={() => {
                  if (!bulkStimId) {
                    showToast("Please select a stimulus first", "error");
                    return;
                  }
                  
                  const targetStimId = bulkStimId === 'clear_all' ? '' : bulkStimId;
                  
                  setProjects(prev => prev.map(p => {

              >

            </div>
            
            <div className="max-h-60 overflow-y-auto space-y-2.5 pr-1 border border-slate-205 dark:border-slate-800/80 p-4 rounded-2xl bg-white dark:bg-slate-900 shadow-inner">
              {(project.sections || []).map((sec, idx) => (
                <div key={sec.id} className="flex flex-col sm:flex-row sm:items-center justify-between gap-3 p-3 rounded-xl bg-slate-50 dark:bg-slate-950 text-xs border border-transparent dark:border-slate-850">
                  <span className="font-bold text-slate-700 dark:text-slate-200">Topic {idx + 1}: {sec.name.replace(/^\d+\.\s*/, '').trim()}</span>
                  <select
                    value={sec.stimulusId || ''}
                    onChange={(e) => handleSectionStimLink(sec.id, e.target.value)}
                    className="text-[10px] p-2 bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-lg cursor-pointer max-w-xs focus:outline-none font-bold text-slate-700 dark:text-slate-200"
                  >
                    <option value="">No Stimulus</option>
                    {(project.stimuli || []).map(stim => (
                      <option key={stim.id} value={stim.id}>{stim.name}</option>
                    ))}
                  </select>
                </div>
              ))}
            </div>
          </div>

          {sectionsWithStim.length > 0 ? (
            <React.Fragment>
          {/* Ratios and Weights configuration list */}
          <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
            
            {/* Weight inputs */}
            <div className="space-y-3">
              <h5 className="text-[11px] font-black uppercase text-slate-500 tracking-wider select-none">
                1. Set Stimulus Ratio Weights
              </h5>
              <div className="space-y-2 max-h-48 overflow-y-auto pr-1">
                {(project.stimuli || []).map((stim, idx) => (
                  <div 
                    key={stim.id} 
                    draggable="true"
                    onDragStart={(e) => handleStimDragStart(e, idx)}
                    onDragOver={(e) => handleStimDragOver(e, idx)}
                    onDrop={(e) => handleStimDrop(e, idx)}
                    className="p-2.5 bg-slate-50 dark:bg-slate-955 border border-slate-200 dark:border-slate-850 rounded-xl flex items-center justify-between gap-3 text-xs cursor-move hover:border-brand-500 transition-colors"
                  >
                    <div className="flex items-center gap-1.5 min-w-0 flex-1 select-none">
                      <span className="text-slate-400 font-extrabold select-none">⋮⋮</span>
                      <div className="min-w-0 flex-1">
                        <span className="font-bold text-slate-700 dark:text-slate-255 block truncate">{stim.name}</span>

                      <input 
                        type="number"

                        onChange={(e) => handleWeightChange(stim.id, e.target.value)}
                        className="w-14 p-1 bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-lg text-center text-xs font-bold text-slate-800 dark:text-white focus:outline-none focus:border-brand-500"
                      />

                      </span>
                    </div>
                  ))}
                </div>
                
                <button 
                  onClick={autoGenerateRotations}
                  className="w-full mt-3 py-2 bg-brand-700 hover:bg-brand-600 text-white font-extrabold text-xs rounded-xl flex items-center justify-center gap-1.5 transition-colors cursor-pointer shadow-sm shadow-brand-500/10"
                >
                  ⚡ Auto-Generate Counterbalance Matrix
                </button>
              </div>
            </div>

          </div>

          {/* Grid display */}
          <div className="space-y-3">
            <h5 className="text-[11px] font-black uppercase text-slate-500 tracking-wider select-none">
              3. Counterbalance Assignment Grid
            </h5>

            <div className="overflow-x-auto border border-slate-100 dark:border-slate-800 rounded-2xl shadow-sm">
              <table className="w-full text-left border-collapse text-xs">
                <thead>
                  <tr className="bg-slate-50 dark:bg-slate-950 border-b border-slate-100 dark:border-slate-800 select-none">
                    <th className="p-3.5 font-bold text-slate-500 w-24">Session #</th>
                    {sectionsWithStim.map(sec => (
                      <th key={sec.id} className="p-3.5 font-bold text-slate-550 min-w-[160px] max-w-[240px]">
                        <span className="block truncate text-slate-850 dark:text-slate-200 font-bold">{sec.name}</span>
                        <span className="block text-[9px] text-slate-455 font-normal">Default: {project.stimuli?.find(s => s.id === sec.defaultStimId)?.name}</span>
                      </th>
                    ))}
                  </tr>
                </thead>
                <tbody>
                  {Array.from({ length: numSessions }, (_, i) => i).map(idx => {
                    const sessionNum = idx + 1;
                    return (
                      <tr 
                        key={sessionNum} 
                        draggable="true"
                        onDragStart={(e) => handleSessionDragStart(e, idx)}
                        onDragOver={(e) => handleSessionDragOver(e, idx)}
                        onDrop={(e) => handleSessionDrop(e, idx)}
                        className="border-b border-slate-100 dark:border-slate-800/80 hover:bg-slate-50/50 dark:hover:bg-slate-955/20 cursor-move transition-colors"
                      >
                        <td className="p-3.5 font-bold text-slate-800 dark:text-slate-100 select-none">
                          <div className="flex items-center gap-1.5 cursor-move">
                            <span className="text-slate-400 font-extrabold select-none">⋮⋮</span>
                            Session {sessionNum}
                          </div>
                        </td>
                        {sectionsWithStim.map(sec => {
                          const currentAssigned = project.counterbalance?.[sessionNum]?.[sec.id] !== undefined
                            ? project.counterbalance[sessionNum][sec.id]
                            : sec.defaultStimId;

                          return (
                            <td key={sec.id} className="p-2">
                              <select
                                value={currentAssigned}
                                onChange={(e) => handleCellChange(sessionNum, sec.id, e.target.value)}
                                className="w-full p-2 bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-xl text-[11px] cursor-pointer focus:outline-none"
                              >
                                <option value="">None</option>
                                {project.stimuli?.map(stim => (
                                  <option key={stim.id} value={stim.id}>{stim.name}</option>
                                ))}
                              </select>
                            </td>
                          );
                        })}
                      </tr>
                    );
                  })}
                </tbody>
              </table>
            </div>
          </div>
          
          </React.Fragment>
          ) : (
            <div className="bg-slate-50 dark:bg-slate-955 border border-dashed border-slate-250 dark:border-slate-850 p-6 rounded-2xl text-xs text-slate-400 italic text-center select-none">
              💡 Select a default stimulus for at least one topic/section in the list above to generate the counterbalance exposure matrix.
            </div>
          )}
        </div>
      );
    };

      // Document Review states
      const [documentReviewText, setDocumentReviewText] = useState('');
      const [documentReviewName, setDocumentReviewName] = useState('');
      const [showReviewer, setShowReviewer] = useState(false);

      const [toasts, setToasts] = useState([]);

      // Active Presentation Session State

        sessionDurationElapsed: 0,

      });

      const activeProject = useMemo(() => {

      }, [projects, activeProjectId]);

      const editingProject = useMemo(() => {

        // Sort by timestamp/date descending
        return list.sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp));

      useEffect(() => {

      const downloadWordSummary = (project) => {

        const htmlContent = `

        `;

        const blob = new Blob(['\ufeff' + htmlContent], { type: 'application/msword' });
        const url = URL.createObjectURL(blob);
        const link = document.createElement('a');
        link.href = url;
        link.download = `summary_${project.name.replace(/[^a-z0-9]/gi, '_').toLowerCase()}_${new Date().toISOString().slice(0,10)}.doc`;
        link.click();
        URL.revokeObjectURL(url);
        showToast("Summary report Word file downloaded!", "success");
      };

      const calculateQuestionAllocations = (section) => {
        if (!section) return {};
        const totalSecSeconds = (section.duration || 0) * 60;
        const questions = section.questions || [];
        
        let overriddenSeconds = 0;
        let autoCount = 0;

        questions.forEach(q => {
          if (q.timeOverride) {
            overriddenSeconds += q.timeOverride * 60;
          } else {
            autoCount++;
          }
        });

        const allocations = {};
        
        if (overriddenSeconds >= totalSecSeconds) {
          const scale = totalSecSeconds / overriddenSeconds;
          questions.forEach(q => {
            if (q.timeOverride) {
              allocations[q.id] = Math.round(q.timeOverride * 60 * scale);
            } else {
              allocations[q.id] = 0;
            }
          });
        } else {
          const remainingSeconds = totalSecSeconds - overriddenSeconds;
          const autoAllocation = autoCount > 0 ? Math.floor(remainingSeconds / autoCount) : 0;
          let remainder = remainingSeconds - (autoAllocation * autoCount);

          questions.forEach(q => {
            if (q.timeOverride) {
              allocations[q.id] = q.timeOverride * 60;
            } else {
              allocations[q.id] = autoAllocation + (remainder > 0 ? 1 : 0);
              remainder--;
            }
          });
        }

        return allocations;
      };

      // --- REAL TIME DYNAMIC PACING CALCULATIONS ---
      const dynamicPacingState = useMemo(() => {
        if (!activeProject || view !== 'presentation') return null;

        const sections = activeProject.sections || [];
        const currentSecIdx = sessionState.currentSectionIndex;
        const currentQIdx = sessionState.currentQuestionIndex;

        const T_total = sections.reduce((acc, s) => acc + (s.duration || 0) * 60, 0);
        const E_past = sections.slice(0, currentSecIdx).reduce((acc, s) => {
          return acc + (sessionState.elapsedTimes[s.id] || 0);
        }, 0);

        const currentSection = sections[currentSecIdx];
        if (!currentSection) return null;

        const E_current = sessionState.elapsedTimes[currentSection.id] || 0;
        const E_total = E_past + E_current;
        const T_rem = Math.max(0, T_total - E_total);

        const R_k = Math.max(0, ((currentSection.duration || 0) * 60) - E_current);

        let T_protected = 0;
        let T_flexible_nominal = 0;

        sections.forEach((sec, idx) => {
          if (idx < currentSecIdx) return;
          const isCurrent = idx === currentSecIdx;
          const nominalVal = isCurrent ? R_k : ((sec.duration || 0) * 60);

          if (sec.strictPriority) {
            T_protected += nominalVal;
          } else {
            T_flexible_nominal += nominalVal;
          }
        });

        const T_flexible_adj = Math.max(0, T_rem - T_protected);
        
        let S_factor = 0;
        let S_priority_factor = 1;

        if (T_flexible_nominal > 0) {
          S_factor = T_flexible_adj / T_flexible_nominal;
        }

        if (T_rem < T_protected && T_protected > 0) {
          S_priority_factor = T_rem / T_protected;
          S_factor = 0;
        }

        const dynamicSectionDurations = {};
        sections.forEach((sec, idx) => {
          if (idx < currentSecIdx) {
            dynamicSectionDurations[sec.id] = sessionState.elapsedTimes[sec.id] || 0;
          } else {
            const isCurrent = idx === currentSecIdx;
            const nominalVal = isCurrent ? R_k : ((sec.duration || 0) * 60);
            
            let dynVal = 0;
            if (sec.strictPriority) {
              dynVal = nominalVal * S_priority_factor;
            } else {
              dynVal = nominalVal * S_factor;
            }
            dynamicSectionDurations[sec.id] = Math.round(isCurrent ? E_current + dynVal : dynVal);
          }
        });

        const dynamicQuestionDurations = {};
        sections.forEach((sec) => {
          const dynSecSecs = dynamicSectionDurations[sec.id] || 0;
          const nomSecSecs = (sec.duration || 0) * 60;
          const nomAllocations = calculateQuestionAllocations(sec);

          (sec.questions || []).forEach(q => {
            const nomQSecs = nomAllocations[q.id] || 0;
            if (nomSecSecs > 0) {
              dynamicQuestionDurations[q.id] = Math.round(dynSecSecs * (nomQSecs / nomSecSecs));
            } else {
              dynamicQuestionDurations[q.id] = 0;
            }
          });
        });

        const nominalElapsedForCurrentState = sections.slice(0, currentSecIdx).reduce((acc, s) => acc + (s.duration || 0) * 60, 0) + 
          ((currentSection.questions || []).slice(0, currentQIdx).reduce((acc, q) => {
            const allocs = calculateQuestionAllocations(currentSection);
            return acc + (allocs[q.id] || 0);
          }, 0) || 0);

        const pacingDelta = nominalElapsedForCurrentState - E_total;

        return {
          T_total,
          E_total,
          T_rem,
          pacingDelta,
          dynamicSectionDurations,
          dynamicQuestionDurations
        };
      }, [activeProject, view, sessionState]);

      // --- SESSION RUN TIMER LOOP ---
      useEffect(() => {
        let interval = null;
        if (sessionState.status === 'running') {
          interval = setInterval(() => {
            const now = Date.now();
            setSessionState(prev => {
              const currentProject = projects.find(p => p.id === activeProjectId);
              if (!currentProject) return prev;

              const sections = currentProject.sections || [];
              const currentSection = sections[prev.currentSectionIndex];
              const currentQuestion = currentSection?.questions?.[prev.currentQuestionIndex];

              if (!currentSection || !currentQuestion) {
                clearInterval(interval);
                handleFinishSessionNormal();
                return prev;
              }

              const newElapsedTimes = { ...prev.elapsedTimes };
              newElapsedTimes[currentQuestion.id] = (newElapsedTimes[currentQuestion.id] || 0) + 1;
              newElapsedTimes[currentSection.id] = (newElapsedTimes[currentSection.id] || 0) + 1;

              const overallElapsed = prev.sessionDurationElapsed + 1;
              const totalNomSeconds = sections.reduce((acc, s) => acc + (s.duration || 0) * 60, 0);
              
              if (overallElapsed >= totalNomSeconds) {
                showToast("Session time has fully expired!", "warning");
                clearInterval(interval);
                handleFinishSessionNormal();
                return prev;
              }

              return {
                ...prev,
                elapsedTimes: newElapsedTimes,
                sessionDurationElapsed: overallElapsed,
                lastTickTime: now
              };
            });
          }, 1000);
        } else {
          clearInterval(interval);
        }
        return () => clearInterval(interval);
      }, [sessionState.status, activeProjectId, projects]);

      // --- KEYBOARD PRESENTATION LISTENER ---
      useEffect(() => {
        const handleKeyDown = (e) => {
          if (view !== 'presentation') return;
          if (document.activeElement.tagName === 'INPUT' || document.activeElement.tagName === 'TEXTAREA' || document.activeElement.tagName === 'SELECT') {
            return;
          }

          if (e.code === 'ArrowRight') {
            e.preventDefault();
            handleNextQuestion();
          } else if (e.code === 'ArrowLeft') {
            e.preventDefault();
            handlePrevQuestion();
          } else if (e.code === 'Space') {
            e.preventDefault();
            toggleSessionTimer();
          }
        };

        window.addEventListener('keydown', handleKeyDown);
        return () => window.removeEventListener('keydown', handleKeyDown);
      }, [view, sessionState.currentSectionIndex, sessionState.currentQuestionIndex, activeProjectId]);

      const jumpToSection = (targetSecIdx) => {
        if (!activeProject) return;
        const sections = activeProject.sections || [];
        if (targetSecIdx < 0 || targetSecIdx >= sections.length) return;
        
        setSessionState(prev => ({
          ...prev,
          currentSectionIndex: targetSecIdx,
          currentQuestionIndex: 0,
          pendingPreviousSectionReview: false,
          inSectionReview: false
        }));
        
        showToast(`Topic: ${sections[targetSecIdx]?.name.replace(/\[\d+\s*min.*?\]/i, "").trim()}`, "info");
      };

      const handleNextQuestion = () => {
        if (!activeProject) return;
        const sections = activeProject.sections || [];
        const currentSection = sections[sessionState.currentSectionIndex];
        if (!currentSection) return;

        const questions = currentSection.questions || [];

        // 1. If we are currently reviewing the previous section's parked questions at the start of the current section
        if (sessionState.pendingPreviousSectionReview) {
          setSessionState(prev => ({
            ...prev,
            pendingPreviousSectionReview: false
          }));
          return;
        }

        // 2. If we are currently in section review for the last section (at the end of session)
        if (sessionState.inSectionReview) {
          setSessionState(prev => ({ ...prev, inSectionReview: false }));
          handleFinishSessionNormal();
          return;
        }

        // 3. Normal progression
        if (sessionState.currentQuestionIndex < questions.length - 1) {
          // Next question in same section
          setSessionState(prev => ({
            ...prev,
            currentQuestionIndex: prev.currentQuestionIndex + 1
          }));
        } else {
          // Last question of this section: move to the next section and check if we should trigger review
          if (sessionState.currentSectionIndex < sections.length - 1) {
            // Check if the current section (which is ending) has unresolved parked questions
            const unresolvedParked = (sessionState.parkedTopics || []).some(
              t => t.sectionId === currentSection.id && !t.resolved
            );
            
            // Advance to the next section (which starts now!)
            setSessionState(prev => ({
              ...prev,
              currentSectionIndex: prev.currentSectionIndex + 1,
              currentQuestionIndex: 0,
              // If there are unresolved parked questions from the section that just ended, show review first!
              pendingPreviousSectionReview: unresolvedParked
            }));
            
            if (unresolvedParked) {
              showToast(`Topic ${sessionState.currentSectionIndex + 2} started. Review parked questions from Topic ${sessionState.currentSectionIndex + 1}.`, "info");
            }
          } else {
            // Last section, last question: Check if there are unresolved parked questions for this final section
            const unresolvedParked = (sessionState.parkedTopics || []).some(
              t => t.sectionId === currentSection.id && !t.resolved
            );
            if (unresolvedParked) {
              setSessionState(prev => ({
                ...prev,
                inSectionReview: true
              }));
              showToast("Review unresolved parked questions for final section", "info");
            } else {
              handleFinishSessionNormal();
            }
          }
        }
      };

      const handlePrevQuestion = () => {
        if (!activeProject) return;
        const sections = activeProject.sections || [];

        // 1. If we are on the review screen for previous section
        if (sessionState.pendingPreviousSectionReview) {
          // Go back to the last question of the previous section
          const prevSectionIndex = sessionState.currentSectionIndex - 1;
          const prevSection = sections[prevSectionIndex];
          const prevQuestionsCount = prevSection?.questions?.length || 1;
          setSessionState(prev => ({
            ...prev,
            pendingPreviousSectionReview: false,
            currentSectionIndex: prevSectionIndex,
            currentQuestionIndex: prevQuestionsCount - 1
          }));
          return;
        }

        // 2. If we are in the section review of the last section
        if (sessionState.inSectionReview) {
          setSessionState(prev => ({
            ...prev,
            inSectionReview: false
          }));
          return;
        }

        // 3. Normal prev question progression
        if (sessionState.currentQuestionIndex > 0) {
          setSessionState(prev => ({
            ...prev,
            currentQuestionIndex: prev.currentQuestionIndex - 1
          }));
        } else {
          // First question of current section: go to previous section's last question
          if (sessionState.currentSectionIndex > 0) {
            const prevSectionIndex = sessionState.currentSectionIndex - 1;
            const prevSection = sections[prevSectionIndex];
            const prevQuestionsCount = prevSection?.questions?.length || 1;
            
            setSessionState(prev => ({
              ...prev,
              currentSectionIndex: prevSectionIndex,
              currentQuestionIndex: prevQuestionsCount - 1,
              pendingPreviousSectionReview: false
            }));
          } else {
            showToast("Already at the first question", "info");
          }
        }
      };

      const toggleSessionTimer = () => {
        setSessionState(prev => ({
          ...prev,
          status: prev.status === 'running' ? 'paused' : 'running',
          lastTickTime: Date.now()
        }));
        showToast(sessionState.status === 'running' ? "Timer Paused" : "Timer Resumed", "info");
      };

      const handleFinishSessionNormal = () => {
        if (sessionState.mode === 'launch') {
          setProjects(prev => prev.map(p => p.id === activeProjectId ? {
            ...p,
            completedSessionsCount: (p.completedSessionsCount || 0) + 1
          } : p));
        }

        setSessionState(prev => ({
          ...prev,
          status: 'idle',
          endedEarlyReason: '',
          unfinishedQuestions: []
        }));
        setView('wrapup');
        showToast("Session completed successfully!", "success");
      };

      const endSessionEarly = () => {
        const reason = prompt("Enter reason for ending session early (Optional):") || "Session closed early by moderator.";
        
        const unfinished = [];
        const sections = activeProject.sections || [];
        
        sections.forEach((sec, sIdx) => {
          if (sIdx < sessionState.currentSectionIndex) return;
          const questions = sec.questions || [];
          questions.forEach((q, qIdx) => {
            if (sIdx === sessionState.currentSectionIndex && qIdx <= sessionState.currentQuestionIndex) {
              return;
            }
            unfinished.push({
              sectionName: sec.name,
              questionText: q.text
            });
          });
        });

        if (sessionState.mode === 'launch') {
          setProjects(prev => prev.map(p => p.id === activeProjectId ? {
            ...p,
            completedSessionsCount: (p.completedSessionsCount || 0) + 1
          } : p));
        }

        setSessionState(prev => ({
          ...prev,
          status: 'idle',
          endedEarlyReason: reason,
          unfinishedQuestions: unfinished
        }));
        setView('wrapup');
        showToast("Session ended early.", "warning");
      };

      const startSession = (projectId, mode = 'trial') => {
        const project = projects.find(p => p.id === projectId);
        if (!project) return;
        
        const hasEmptySections = project.sections.some(s => !s.questions || s.questions.length === 0);
        if (hasEmptySections) {
          setProjects(prev => prev.map(p => p.id === projectId ? {
            ...p,
            sections: p.sections.map(s => (!s.questions || s.questions.length === 0) ? {
              ...s,
              questions: [{ id: 'q_' + generateId(), text: 'Overview of topic.', probingNotes: '', stimulusId: '', screenShareReminder: 'none' }]
            } : s)
          } : p));
        }

        const sessionNum = (project.completedSessionsCount || 0) + 1;

        setActiveProjectId(projectId);
        setSessionState({
          status: 'running',
          mode: mode,
          sessionNumber: sessionNum,
          conditionIndex: mode === 'launch' ? ((sessionNum - 1) % 8) + 1 : 1,
          currentSectionIndex: 0,
          currentQuestionIndex: 0,
          elapsedTimes: {},
          parkedTopics: [],
          sessionDurationElapsed: 0,
          lastTickTime: Date.now(),
          endedEarlyReason: '',
          unfinishedQuestions: [],
          inSectionReview: false,
          pendingPreviousSectionReview: false
        });
        setView('presentation');
        showToast(mode === 'trial' ? "Trial Session started" : `Active Session #${sessionNum} launched`, "success");
      };

      const saveSessionToHistory = (notesText) => {
        if (!activeProjectId) return;
        
        // Generate counterbalance stimulus mappings
        const counterbalanceMapping = {};
        const activeCondition = sessionState.conditionIndex || 1;
        const currentProj = projects.find(p => p.id === activeProjectId);
        if (!currentProj) return;

        (currentProj.sections || []).forEach(sec => {
          const cbStimId = currentProj.counterbalance?.[activeCondition]?.[sec.id];
          const finalStimId = cbStimId !== undefined ? cbStimId : sec.stimulusId;
          const stim = currentProj.stimuli?.find(s => s.id === finalStimId);
          if (stim) {
            counterbalanceMapping[sec.name] = `${stim.name} (${stim.type})`;
          }
        });

        const newLog = {
          id: 'sess_' + generateId(),
          timestamp: new Date().toLocaleString(),
          mode: sessionState.mode,
          sessionNumber: sessionState.sessionNumber,
          conditionIndex: activeCondition,
          durationSeconds: sessionState.sessionDurationElapsed,
          endedEarly: sessionState.unfinishedQuestions.length > 0,
          endedEarlyReason: sessionState.endedEarlyReason,
          unfinishedQuestions: [...sessionState.unfinishedQuestions],
          parkedTopics: [...sessionState.parkedTopics],
          notes: notesText,
          counterbalanceStimuli: counterbalanceMapping
        };

        setProjects(prev => prev.map(p => p.id === activeProjectId ? {
          ...p,
          sessionHistory: [newLog, ...(p.sessionHistory || [])]
        } : p));
      };

      const handleDocumentUpload = (e) => {
        const file = e.target.files[0];
        if (!file) return;

        setDocumentReviewName(file.name);
        showToast(`Processing file: ${file.name}...`, 'info');

        const fileExtension = file.name.split('.').pop().toLowerCase();

        if (fileExtension === 'docx') {
          const reader = new FileReader();
          reader.onload = function(event) {
            const arrayBuffer = event.target.result;
            window.mammoth.extractRawText({ arrayBuffer: arrayBuffer })
              .then(result => {
                setDocumentReviewText(result.value);
                setShowReviewer(true);
                showToast("Word document successfully parsed!", "success");
              })
              .catch(err => {
                showToast("Failed to parse Word document: " + err.message, "error");
              });
          };
          reader.readAsArrayBuffer(file);
        } else if (fileExtension === 'pdf') {
          const reader = new FileReader();
          reader.onload = function() {
            const typedarray = new Uint8Array(this.result);
            window.pdfjsLib.getDocument(typedarray).promise
              .then(async (pdf) => {
                let extractedText = '';
                
                for (let i = 1; i <= pdf.numPages; i++) {
                  const page = await pdf.getPage(i);
                  const textContent = await page.getTextContent();
                  const items = textContent.items.filter(item => item.str && item.str.trim().length > 0);
                  
                  items.sort((a, b) => {
                    const yDiff = b.transform[5] - a.transform[5];
                    if (Math.abs(yDiff) > 5) {
                      return yDiff;
                    }
                    return a.transform[4] - b.transform[4];
                  });

                  let lastY = null;
                  let pageText = '';
                  
                  items.forEach(item => {
                    const currentY = item.transform[5];
                    if (lastY !== null) {
                      if (Math.abs(currentY - lastY) > 6) {
                        pageText += '\n';
                      } else {
                        pageText += ' ';
                      }
                    }
                    pageText += item.str;
                    lastY = currentY;
                  });

                  extractedText += `--- Page ${i} ---\n${pageText}\n\n`;
                }

                setDocumentReviewText(extractedText);
                setShowReviewer(true);
                showToast("PDF document successfully parsed!", "success");
              })
              .catch(err => {
                showToast("Failed to parse PDF document: " + err.message, "error");
              });
          };
          reader.readAsArrayBuffer(file);
        } else {
          showToast("Unsupported file format. Please upload a .docx or .pdf file.", "error");
        }
        e.target.value = '';
      };

      const createProjectFromParsedReviewText = () => {
        if (!documentReviewText.trim()) return;

        const parsed = parseRawTextToStructuredGuide(documentReviewText);
        
        if (parsed.sections.length === 0) {
          showToast("Could not extract sections. Try adding some text content.", "error");
          return;
        }

        const newProject = {
          id: 'proj_' + generateId(),
          name: `Imported: ${documentReviewName.replace(/\.[^/.]+$/, "")}`,
          description: `Auto-extracted from ${documentReviewName} on ${new Date().toLocaleDateString()}`,
          objectives: '',
          completedSessionsCount: 0,
          plannedSessions: 4,
          stimuli: parsed.stimuli,
          counterbalance: {},
          sections: parsed.sections
        };

        setProjects(prev => [newProject, ...prev]);
        setShowReviewer(false);
        setDocumentReviewText('');
        setActiveSectionIndex(0);
        showToast(`Project created with ${parsed.sections.length} sections and ${parsed.stimuli.length} stimuli!`, "success");
        setEditingProjectId(newProject.id);
        setBuilderStep(1);
        setView('builder');
      };

      const handleWorkspaceExport = () => {
        const dataStr = JSON.stringify(projects, null, 2);
        const dataUri = 'data:application/json;charset=utf-8,'+ encodeURIComponent(dataStr);
        const exportFileDefaultName = `moderator_copilot_workspace_backup_${new Date().toISOString().slice(0,10)}.json`;
        const linkElement = document.createElement('a');
        linkElement.setAttribute('href', dataUri);
        linkElement.setAttribute('download', exportFileDefaultName);
        linkElement.click();
        showToast("Workspace backup downloaded!", "success");
      };

      const handleWorkspaceImport = (e) => {
        const file = e.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = (event) => {
          try {
            const data = JSON.parse(event.target.result);
            if (Array.isArray(data)) {
              setProjects(prev => {
                const existingIds = prev.map(p => p.id);
                const filteredNew = data.filter(p => !existingIds.includes(p.id));
                return [...filteredNew, ...prev];
              });
              showToast(`Imported ${data.length} projects successfully!`, "success");
            } else if (data && typeof data === 'object' && data.sections) {
              setProjects(prev => [data, ...prev]);
              showToast(`Imported single project "${data.name}"`, "success");
            } else {
              showToast("Invalid backup file structure.", "error");
            }
          } catch (err) {
            showToast("Failed to parse JSON file.", "error");
          }
        };
        reader.readAsText(file);
        e.target.value = '';
      };

      const handleCSVImport = (e) => {
        const file = e.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = (event) => {
          try {
            const csvRows = parseCSV(event.target.result);
            if (csvRows.length < 2) {
              showToast("Empty CSV file.", "error");
              return;
            }

            const sectionsMap = {};
            const projectStimuli = [];
            
            for (let i = 1; i < csvRows.length; i++) {
              const row = csvRows[i];
              if (row.length < 4 || !row[0]) continue;

              const secName = row[0];
              const secDuration = parseInt(row[1]) || 10;
              const secPriority = row[2].toLowerCase() === 'true';
              const qText = row[3];
              const qProbing = row[4] || "";
              const stimName = row[5] || "";
              const stimUrl = row[6] || "";
              const screenReminder = row[7] || "none";
              const qOverride = row[8] ? parseInt(row[8]) : undefined;

              let assignedStimId = '';
              if (stimUrl) {
                let existingStim = projectStimuli.find(s => s.url === stimUrl);
                if (!existingStim) {
                  existingStim = {
                    id: 'stim_' + generateId(),
                    name: stimName || 'Imported Stimulus',
                    type: 'url',
                    url: stimUrl,
                    fileName: ''
                  };
                  projectStimuli.push(existingStim);
                }
                assignedStimId = existingStim.id;
              }

              if (!sectionsMap[secName]) {
                sectionsMap[secName] = {
                  id: 'sec_' + generateId(),
                  name: secName,
                  duration: secDuration,
                  strictPriority: secPriority,
                  questions: []
                };
              }

              sectionsMap[secName].questions.push({
                id: 'q_' + generateId(),
                text: qText,
                probingNotes: qProbing,
                stimulusId: assignedStimId,
                screenShareReminder: screenReminder,
                timeOverride: qOverride
              });
            }

            const importedSections = Object.values(sectionsMap);
            if (importedSections.length === 0) {
              showToast("Could not extract any valid guide sections from CSV.", "error");
              return;
            }

            const newProj = {
              id: 'proj_' + generateId(),
              name: `CSV Import: ${file.name.replace(/\.[^/.]+$/, "")}`,
              description: `Imported from CSV file on ${new Date().toLocaleDateString()}`,
              objectives: '',
              completedSessionsCount: 0,
              plannedSessions: 4,
              stimuli: projectStimuli,
              counterbalance: {},
              sections: importedSections
            };

            setProjects(prev => [newProj, ...prev]);
            setActiveSectionIndex(0);
            showToast("Project CSV imported successfully!", "success");
            setEditingProjectId(newProj.id);
            setBuilderStep(1);
            setView('builder');

          } catch (err) {
            showToast("Failed to parse CSV file: " + err.message, "error");
          }
        };
        reader.readAsText(file);
        e.target.value = '';
      };

      const createNewProject = () => {
        const newProject = {
          id: 'proj_' + generateId(),
          name: 'Untitled Moderation Guide',
          description: 'Custom guide built from scratch.',
          objectives: '',
          completedSessionsCount: 0,
          plannedSessions: 4,
          stimuli: [],
          counterbalance: {},
          sections: [
            {
              id: 'sec_' + generateId(),
              name: '1. Introduction',
              duration: 10,
              strictPriority: false,
              questions: [
                {
                  id: 'q_' + generateId(),
                  text: 'Enter your first question here...',
                  probingNotes: '',
                  stimulusId: '',
                  screenShareReminder: 'none'
                }
              ]
            }
          ]
        };
        setProjects(prev => [newProject, ...prev]);
        setEditingProjectId(newProject.id);

                return (

                    {/* Left Pane: Question Teleprompter */}

                      {/* SCREEN SHARE REMINDER BANNER */}

                        {currentQ?.screenShareReminder === 'participant' && !sessionState.inSectionReview && (

                            <span className="text-xl">📺</span>
                            <div>
                              <div className="font-extrabold uppercase text-[10px] tracking-wider text-amber-500 mb-0.5">Screen Share Reminder</div>
                              <div>Ask participant to share their screen to view stimulus.</div>
                            </div>
                          </div>

                        {currentQ?.screenShareReminder === 'moderator' && !sessionState.inSectionReview && (
                          <div className="p-4 bg-brand-500/10 border border-brand-500/20 text-brand-600 dark:text-brand-400 rounded-xl flex items-center gap-3 text-sm font-semibold animate-pulse shadow-sm shadow-brand-500/5">
                            <span className="text-xl">💻</span>
                            <div>
                              <div className="font-extrabold uppercase text-[10px] tracking-wider text-brand-600 dark:text-brand-405 mb-0.5">Screen Share Reminder</div>
                              <div>Remember to share your screen / display stimulus.</div>
                            </div>
                          </div>
                        )}
                      </div>

                       {/* Intermediate Checklist Overlay vs normal Question presentation */}
                      {(sessionState.pendingPreviousSectionReview || sessionState.inSectionReview) ? (() => {
                        const targetSec = sessionState.pendingPreviousSectionReview 
                          ? activeProject.sections[sessionState.currentSectionIndex - 1]
                          : activeProject.sections[sessionState.currentSectionIndex];
                        
                        const targetParked = (sessionState.parkedTopics || []).filter(
                          t => t.sectionId === targetSec?.id && !t.resolved

                        return (
                          <div className="my-auto flex flex-col justify-center min-h-[220px] animate-slide-up select-text">
                            <span className="text-xs uppercase font-extrabold tracking-widest text-amber-600 dark:text-amber-400 block mb-2 select-none no-select flex items-center gap-1.5 font-sans">
                              <span>⚠️</span> Section checkpoint • Review Parked Comments
                            </span>
                            
                            <h2 className={`text-2xl md:text-3xl font-extrabold leading-tight mb-2 ${
                              theme === 'dark' ? 'text-white' : 'text-slate-850'

                              {sessionState.pendingPreviousSectionReview ? (
                                <>Topic "{targetSec?.name}" ended. Review parked topics before continuing:</>

                                <>Review parked topics for final section before wrapping up:</>
                              )}

                            <p className="text-xs text-slate-400 mb-5 select-none font-semibold">

                            <div className="space-y-2.5 max-h-60 overflow-y-auto pr-2">
                              {targetParked.length === 0 ? (
                                <div className="text-xs italic text-slate-400 py-3">

                                </div>

                                targetParked.map(topic => (
                                  <label 
                                    key={topic.id}
                                    className={`flex items-start gap-3 p-3.5 border rounded-xl cursor-pointer select-none transition-all ${
                                      theme === 'dark' 
                                        ? 'bg-slate-900 border-slate-800 hover:border-slate-700 text-white' 
                                        : 'bg-white border-slate-200 hover:bg-slate-100 text-slate-800 shadow-sm'
                                    }`}
                                  >
                                    <input 
                                      type="checkbox" 
                                      checked={topic.resolved}
                                      onChange={() => toggleParkedTopic(topic.id)}
                                      className="rounded border-slate-350 dark:border-slate-700 text-brand-600 focus:ring-brand-500 h-4.5 w-4.5 mt-0.5 cursor-pointer"
                                    />
                                    <span className="text-sm font-semibold leading-normal">{topic.text}</span>
                                  </label>
                                ))

                            </div>
                          </div>

                            theme === 'dark' ? 'text-slate-550' : 'text-slate-400'
                          }`}>
                            Discussion Guide • Topic {sessionState.currentSectionIndex + 1}
                          </span>
                          
                          <h2 className={`${qFontSize} font-normal leading-relaxed tracking-tight whitespace-pre-wrap ${
                             theme === 'dark' ? 'text-white' : 'text-slate-850'
                           }`}>

                           {/* Probing notes highlights appear right below the question text */}

                             <div className={`${notesFontSize} leading-relaxed border-l-4 border-l-amber-500 border-t-0 border-r-0 border-b-0 p-4 rounded-r-xl rounded-l-none font-medium mt-6 select-text ${

                               <div className="whitespace-pre-wrap">{currentQ.probingNotes}</div>
                             </div>
                           )}

                           {/* Parked topics reminder for the last question of section */}

                               <div>
                                 <div className="font-extrabold uppercase text-[9px] tracking-wider mb-0.5 text-amber-505">Topic End Reminder</div>

                        </button>

                                theme === 'dark' ? 'bg-slate-900 border-slate-800 text-white' : 'bg-slate-50 border-slate-200 text-slate-800'

                                <option key={num} value={num}>Session {num} Condition</option>

                            <div className={`text-[10px] font-extrabold uppercase tracking-widest select-none ${

                              <a

                                rel="noopener noreferrer"

                              >
                                <svg className="w-3.5 h-3.5" fill="none" stroke="currentColor" strokeWidth="2.5" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"/></svg>
                                Launch Stimulus
                              </a>
                              {!currentStimulus.fileName && (
                                <button 
                                  onClick={() => {
                                    navigator.clipboard.writeText(currentStimulus.url);
                                    showToast("Stimulus Link copied!", "info");
                                  }}
                                  className={`px-3 border rounded-lg text-xs font-semibold transition-colors cursor-pointer ${
                                    theme === 'dark' ? 'border-slate-805 hover:bg-slate-800 text-slate-400 hover:text-slate-200' : 'border-slate-200 hover:bg-slate-100 text-slate-500 hover:text-slate-700'
                                  }`}
                                  title="Copy Link"
                                >
                                  <svg className="w-4 h-4" fill="none" stroke="currentColor" strokeWidth="2.5" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" d="M8 5H6a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2v-1M8 5a2 2 0 002 2h2a2 2 0 002-2M8 5a2 2 0 012-2h2a2 2 0 012 2m0 0h2a2 2 0 012 2v3m2 4H10m0 0l3-3m-3 3l3 3"/></svg>
                                </button>
                              )}
                            </div>
                          </div>
                        )}

                        {/* ALL STIMULI DIRECTORY */}
                        {activeProject.stimuli && activeProject.stimuli.length > 0 && (
                          <div className={`border-t pt-6 ${theme === 'dark' ? 'border-slate-800' : 'border-slate-200'}`}>
                            <h3 className={`text-xs font-extrabold uppercase tracking-wider mb-3 select-none ${theme === 'dark' ? 'text-slate-400' : 'text-slate-500'}`}>Stimuli Library Directory</h3>
                            <div className="space-y-2.5 max-h-48 overflow-y-auto pr-1">
                              {activeProject.stimuli.map(stim => {
                                const isCurrent = stim.id === finalStimulusId;
                                return (
                                  <div 
                                    key={stim.id} 
                                    className={`flex items-center justify-between gap-3 p-2.5 rounded-xl border transition-all ${
                                      isCurrent 
                                        ? 'bg-brand-500/5 border-brand-500/30' 
                                        : theme === 'dark'
                                          ? 'bg-slate-950/40 border-slate-800/40 hover:border-slate-800'
                                          : 'bg-white border-slate-200 hover:border-slate-300'
                                    }`}
                                  >
                                    <div className="flex-1 min-w-0">
                                      <div className={`text-xs font-bold truncate flex items-center gap-1.5 ${theme === 'dark' ? 'text-slate-200' : 'text-slate-700'}`}>
                                        {isCurrent && <span className="w-1.5 h-1.5 rounded-full bg-brand-500 animate-pulse"></span>}
                                        {stim.name}
                                      </div>
                                      <div className="text-[10px] text-slate-450 truncate mt-0.5 font-mono">{stim.fileName ? `File: ${stim.fileName}` : stim.url}</div>
                                    </div>
                                    <a 
                                      href={stim.url} 
                                      target="_blank" 
                                      rel="noopener noreferrer"
                                      className={`p-2 rounded-lg border transition-colors cursor-pointer ${
                                        theme === 'dark'
                                          ? 'bg-slate-855 hover:bg-slate-800 border-slate-800 hover:border-slate-700 text-slate-300 hover:text-white'
                                          : 'bg-slate-50 hover:bg-slate-100 border-slate-200 text-slate-600 hover:text-slate-800 shadow-sm'
                                      }`}
                                      title={`Launch ${stim.name}`}
                                    >
                                      <svg className="w-3.5 h-3.5" fill="none" stroke="currentColor" strokeWidth="2.5" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"/></svg>
                                    </a>
                                  </div>
                                );
                              })}
                            </div>
                          </div>
                        )}
                      </div>

                      {/* FLOATING TOPIC PARKER BOX */}
                      <div className={`border-t pt-6 mt-auto select-none no-select ${theme === 'dark' ? 'border-slate-800' : 'border-slate-200'}`}>
                        <h3 className={`text-xs font-extrabold uppercase tracking-wider mb-2 select-none ${theme === 'dark' ? 'text-slate-400' : 'text-slate-500'}`}>Park a Topic</h3>
                        <form 
                          onSubmit={(e) => {
                            e.preventDefault();
                            const input = e.target.elements.topicInput;
                            parkTopic(input.value);
                            input.value = '';
                          }}
                          className="flex gap-2"
                        >
                          <input 
                            name="topicInput"
                            type="text" 
                            className={`flex-1 text-xs px-3 py-2 rounded-lg placeholder-slate-450 focus:outline-none focus:border-brand-500 ${
                              theme === 'dark' 
                                ? 'bg-slate-955 border-slate-800 text-white placeholder-slate-600' 
                                : 'bg-white border-slate-250 text-slate-800 placeholder-slate-400'
                            }`}
                            placeholder="Park comment to return to later..."
                            autoComplete="off"
                          />
                          <button 
                            type="submit"
                            className="px-3.5 py-2 bg-brand-700 hover:bg-brand-600 rounded-lg text-xs font-bold text-white transition-colors cursor-pointer"
                          >
                            Add
                          </button>
                        </form>

                        {sessionState.parkedTopics.length > 0 && (
                          <div className="mt-4 max-h-28 overflow-y-auto space-y-1.5 select-text pr-1">
                            {sessionState.parkedTopics.map(topic => (
                              <div 
                                key={topic.id} 
                                className={`text-xs flex items-start gap-1.5 p-2 rounded border ${
                                  theme === 'dark' 
                                    ? 'text-slate-400 bg-slate-955/45 border-slate-900' 
                                    : 'text-slate-600 bg-white border-slate-200 shadow-sm'
                                }`}
                              >
                                <span className="text-brand-500 mt-0.5">•</span>
                                <span className="line-clamp-2 leading-snug">{topic.text}</span>
                              </div>
                            ))}
                          </div>
                        )}
                      </div>
